server:
  port: 8080
  mode: debug

mounted_wiki:
  root: /Users/chenhao/Project/knowledge-base
  name: default-wiki
  qmd_index: zy-knowledge-base

llm:
  provider: deepseek
  model_public: deepseek-v4-flash
  model_admin: deepseek-v4-flash
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  timeout_sec: 90
  admin_timeout_sec: 300

auth:
  default_admin_username: admin
  default_admin_password: admin123
  session_cookie_name: wikios_admin_session
  session_ttl_hours: 168

retrieval:
  top_k: 5

workspace:
  base_dir: .workspace
  max_file_size_mb: 10
  default_timeout_sec: 20

sandbox:
  python_allow_network: false
  python_timeout_sec: 20
  qmd_timeout_sec: 30

storage:
  sqlite_path: .workspace/service.db

sync:
  provider: github
  enabled: true
  remote: origin
  branch: main

web:
  enabled: true
  dist_dir: web/dist

upload:
  max_text_file_kb: 500
  max_table_rows: 120

public_intents:
  enabled: true
  path: configs/public_intents.yaml

knowledge_profile:
  name: siyetian
  path: configs/knowledge_profiles/siyetian.yaml

context:
  max_tokens: ${WIKIOS_CONTEXT_MAX_TOKENS}
  reserve_tokens: ${WIKIOS_CONTEXT_RESERVE_TOKENS}
  counter: ${WIKIOS_CONTEXT_COUNTER}
  tokenizer: ${WIKIOS_CONTEXT_TOKENIZER}

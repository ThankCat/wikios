server:
  port: 9025
  mode: debug

mounted_wiki:
  root: /Users/chenhao/Project/knowledge-base
  name: default-wiki
  qmd_index: knowledge-base

llm:
  timeout_sec: 300
  admin_timeout_sec: 300

retrieval:
  top_k: 5

workspace:
  base_dir: .workspace
  max_file_size_mb: 10
  default_timeout_sec: 20

sandbox:
  python_allow_network: false
  python_timeout_sec: 20
  qmd_timeout_sec: 30

storage:
  sqlite_path: .workspace/service.db

sync:
  provider: github
  enabled: true
  remote: origin
  branch: main

web:
  enabled: true
  dist_dir: web/dist

upload:
  max_text_file_kb: 500

customer_intents:
  enabled: true
  path: configs/customer_intents.yaml

customer_query:
  candidate_top_k: 6
  max_evidence_chars: 2400
  response_timeout_sec: 300
  answer_log:
    enabled: true
    redact: true
    retention_days: 14
  confidence:
    direct_min: 0.70
    review_min: 0.25

support:
  phone: "400-1080-106"
  wecom: "企业微信"

context:
  max_tokens: ${WIKIOS_CONTEXT_MAX_TOKENS}
  reserve_tokens: ${WIKIOS_CONTEXT_RESERVE_TOKENS}
  counter: ${WIKIOS_CONTEXT_COUNTER}
  tokenizer: ${WIKIOS_CONTEXT_TOKENIZER}

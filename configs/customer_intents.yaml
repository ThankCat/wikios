version: 1

fallbacks:
  generic: 这个问题我还需要再确认一点信息。您可以把具体产品、套餐或使用场景发我，我会按当前对话继续帮您判断。
  operation: 这类操作我需要先确认您使用的产品、设备或页面入口。您把当前步骤和遇到的提示发我，我再继续帮您排查。
  device_operation: 这项操作要结合设备状态来看。您可以补充设备型号、当前页面提示和想完成的动作，我先帮您判断下一步。
  model_unavailable:
    - 当前在线回复暂时有点忙，您可以稍后再发一次，我会继续按当前对话帮您处理。
    - 这边暂时没能生成准确回复，您可以稍后重试一次，前面的对话内容我会继续参考。
    - 当前回复服务短暂不可用，您可以稍后再问一次，我会继续围绕这个问题帮您确认。

rules:
  - name: admin_unsupported
    enabled: true
    priority: 100
    category: safety
    match:
      contains:
        - 删除资料库
        - 删除知识库
        - 删库
        - 删除wiki
        - 删除页面
        - 清空知识库
        - 修改系统
        - 管理页面
        - 查看内部结构
        - 查看 prompt
        - 查看prompt
        - 查看系统提示词
        - 查看 slug
        - 查看slug
        - 查看索引
        - 查看文件路径
        - drop database
        - delete wiki
        - delete knowledge base
    response: 这个请求不属于对外客服问答范围。我可以继续帮您解答四叶天产品、套餐选择和使用排查相关问题。

  - name: identity
    enabled: true
    priority: 80
    category: service_identity
    match:
      exact:
        - 你是谁
        - 你是誰
        - 你是什么
        - 你是什麼
        - 你叫什么
        - 你叫什麼
        - 你是机器人吗
        - 你是機器人嗎
        - 你是AI吗
        - 你是 AI 吗
        - 你是AI嗎
        - 你是 AI 嗎
        - 你能做什么
        - 你能做什麼
        - 你可以做什么
        - 你可以做什麼
        - 你可以帮我什么
        - 你可以幫我什麼
      contains:
        - 你是谁
        - 你是誰
        - 你叫什么
        - 你叫什麼
        - 你能做什么
        - 你能做什麼
        - 你可以做什么
        - 你可以做什麼
        - 你可以帮我什么
        - 你可以幫我什麼
    response: 我是四叶天代理 IP 在线客服，可以帮您看动态 IP、静态 IP、住宅 IP、套餐选择和使用排查。您直接把想了解的产品或遇到的问题发我就行，我会尽量在当前对话里说清楚。

  - name: greeting
    enabled: true
    priority: 50
    category: smalltalk
    match:
      exact:
        - 你好
        - 您好
        - 在吗
        - 在嘛
        - 在不
        - hello
        - hi
        - nihao
    response: 在的。您可以直接说想了解哪类 IP、套餐价格，或者把使用中遇到的现象发我，我来帮您一步步确认。

  - name: thanks_or_done
    enabled: true
    priority: 45
    category: smalltalk
    match:
      exact:
        - 再见
        - 再见吧
        - 拜拜
        - bye
        - goodbye
        - 谢谢
        - 谢谢你
        - 好的
        - 没问题了
        - 暂时没有了
        - thanks
        - thank you
    response: 好的，如后续还有动态IP、静态IP或套餐使用问题，您可以随时咨询。

  - name: human_handoff
    enabled: true
    priority: 70
    category: handoff
    match:
      contains:
        - 人工客服
        - 联系人工
        - 转人工
        - 转让工
        - 转接人工
        - 找人工
        - 投诉
        - 客服热线
        - 客服电话
    response: 我先在这里帮您处理。您把具体产品、订单情况、使用场景或遇到的问题发我，我会尽量先帮您确认清楚。

server:
  port: 8080
  mode: release

mounted_wiki:
  root: /data/wiki-repo
  name: default-wiki
  qmd_index: zy-knowledge-base

llm:
  provider: deepseek
  model_public: deepseek-reasoner
  model_admin: deepseek-reasoner
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  timeout_sec: 90

auth:
  default_admin_username: ${WIKIOS_DEFAULT_ADMIN_USERNAME}
  default_admin_password: ${WIKIOS_DEFAULT_ADMIN_PASSWORD}
  session_cookie_name: wikios_admin_session
  session_ttl_hours: 168

retrieval:
  top_k: 5

workspace:
  base_dir: .workspace
  max_file_size_mb: 10
  default_timeout_sec: 20

sandbox:
  python_allow_network: false
  python_timeout_sec: 20
  qmd_timeout_sec: 30

storage:
  sqlite_path: .workspace/service.db

sync:
  provider: github
  enabled: true
  remote: origin
  branch: main

web:
  enabled: true
  dist_dir: web/dist

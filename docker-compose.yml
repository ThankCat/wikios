services:
  wikios:
    build:
      context: .
      dockerfile: Dockerfile
    image: wikios:local
    container_name: wikios
    restart: unless-stopped
    ports:
      - "9025:9025"
    environment:
      WIKIOS_CONFIG: /app/deploy/config.prod.yaml
      WIKIOS_CUSTOMER_CANDIDATE_TOP_K: ${WIKIOS_CUSTOMER_CANDIDATE_TOP_K:-6}
      WIKIOS_CUSTOMER_MAX_EVIDENCE_CHARS: ${WIKIOS_CUSTOMER_MAX_EVIDENCE_CHARS:-2400}
      WIKIOS_CUSTOMER_RESPONSE_TIMEOUT_SEC: ${WIKIOS_CUSTOMER_RESPONSE_TIMEOUT_SEC:-300}
      WIKIOS_CUSTOMER_CHAT_LOG_ENABLED: ${WIKIOS_CUSTOMER_CHAT_LOG_ENABLED:-true}
      WIKIOS_CUSTOMER_CHAT_LOG_REDACT: ${WIKIOS_CUSTOMER_CHAT_LOG_REDACT:-true}
      WIKIOS_CUSTOMER_CHAT_LOG_RETENTION_DAYS: ${WIKIOS_CUSTOMER_CHAT_LOG_RETENTION_DAYS:-14}
      WIKIOS_QMD_INDEX: ${WIKIOS_QMD_INDEX:-knowledge-base}
      WIKIOS_QMD_AUTO_COLLECTION: ${WIKIOS_QMD_AUTO_COLLECTION:-true}
      WIKIOS_LLM_TIMEOUT_SEC: ${WIKIOS_LLM_TIMEOUT_SEC:-300}
      WIKIOS_LLM_ADMIN_TIMEOUT_SEC: ${WIKIOS_LLM_ADMIN_TIMEOUT_SEC:-300}
      WIKIOS_CONTEXT_MAX_TOKENS: ${WIKIOS_CONTEXT_MAX_TOKENS:-1000000}
      WIKIOS_CONTEXT_RESERVE_TOKENS: ${WIKIOS_CONTEXT_RESERVE_TOKENS:-8192}
      WIKIOS_CONTEXT_COUNTER: ${WIKIOS_CONTEXT_COUNTER:-tokenizer}
      WIKIOS_CONTEXT_TOKENIZER: ${WIKIOS_CONTEXT_TOKENIZER:-cl100k_base}
      WIKIOS_SUPPORT_PHONE: ${WIKIOS_SUPPORT_PHONE:-400-1080-106}
      WIKIOS_SUPPORT_WECOM: ${WIKIOS_SUPPORT_WECOM:-企业微信}
      WIKIOS_WIKI_GIT_URL: ${WIKIOS_WIKI_GIT_URL:-}
      WIKIOS_WIKI_GIT_TOKEN: ${WIKIOS_WIKI_GIT_TOKEN:-}
      WIKIOS_WIKI_GIT_USERNAME: ${WIKIOS_WIKI_GIT_USERNAME:-x-access-token}
      WIKIOS_WIKI_GIT_BRANCH: ${WIKIOS_WIKI_GIT_BRANCH:-main}
      WIKIOS_WIKI_GIT_REMOTE: ${WIKIOS_WIKI_GIT_REMOTE:-origin}
      WIKIOS_WIKI_GIT_PULL_ON_START: ${WIKIOS_WIKI_GIT_PULL_ON_START:-true}
      WIKIOS_WIKI_GIT_RESET_ON_START: ${WIKIOS_WIKI_GIT_RESET_ON_START:-false}
    volumes:
      - wikios-wiki-repo:/data/wiki-repo
      - ./data/workspace:/app/.workspace
      - ./data/qmd-cache:/root/.cache/qmd
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9025/healthz').then(r=>process.exit(r.ok?0\
            :1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  wikios-wiki-repo:

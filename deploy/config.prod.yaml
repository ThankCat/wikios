server:
  port: 9025
  mode: release

mounted_wiki:
  root: /data/wiki-repo
  name: default-wiki
  qmd_index: ${WIKIOS_QMD_INDEX}

llm:
  timeout_sec: ${WIKIOS_LLM_TIMEOUT_SEC}
  admin_timeout_sec: ${WIKIOS_LLM_ADMIN_TIMEOUT_SEC}

retrieval:
  top_k: 5

workspace:
  base_dir: .workspace
  max_file_size_mb: 10
  default_timeout_sec: 20

sandbox:
  python_allow_network: false
  python_timeout_sec: 20
  qmd_timeout_sec: 30

storage:
  sqlite_path: .workspace/service.db

sync:
  provider: github
  enabled: true
  remote: origin
  branch: main

web:
  enabled: true
  dist_dir: web/dist

upload:
  max_text_file_kb: 500

public_intents:
  enabled: true
  path: configs/public_intents.yaml

public_query:
  candidate_top_k: ${WIKIOS_PUBLIC_CANDIDATE_TOP_K}
  max_evidence_chars: ${WIKIOS_PUBLIC_MAX_EVIDENCE_CHARS}
  response_timeout_sec: ${WIKIOS_PUBLIC_RESPONSE_TIMEOUT_SEC}
  answer_log:
    enabled: ${WIKIOS_PUBLIC_ANSWER_LOG_ENABLED}
    redact: ${WIKIOS_PUBLIC_ANSWER_LOG_REDACT}
    retention_days: ${WIKIOS_PUBLIC_ANSWER_LOG_RETENTION_DAYS}
  confidence:
    direct_min: 0.70
    review_min: 0.25

support:
  phone: ${WIKIOS_SUPPORT_PHONE}
  wecom: ${WIKIOS_SUPPORT_WECOM}

context:
  max_tokens: ${WIKIOS_CONTEXT_MAX_TOKENS}
  reserve_tokens: ${WIKIOS_CONTEXT_RESERVE_TOKENS}
  counter: ${WIKIOS_CONTEXT_COUNTER}
  tokenizer: ${WIKIOS_CONTEXT_TOKENIZER}
